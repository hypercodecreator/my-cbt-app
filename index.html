<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>나만의 CBT 학습 센터</title>
    <style>
        body.mobile-mode { padding: 0 !important; background: white !important; overflow-x: hidden !important; }
        body.mobile-mode .container { width: 100vw !important; max-width: 100vw !important; padding: 15px !important; margin: 0 !important; border-radius: 0 !important; box-shadow: none !important; box-sizing: border-box !important; }
        body.mobile-mode div[style*="width: 300px"], body.mobile-mode div[style*="max-width: 800px"], body.mobile-mode div[style*="width: 800px"] { width: 100% !important; max-width: 100% !important; border-right: none !important; margin-bottom: 10px !important; padding-right: 0 !important; }
        body.mobile-mode div[style*="display: flex"], body.mobile-mode div[style*="display:flex"] { flex-wrap: wrap !important; }
        body.mobile-mode div[style*="justify-content: space-between"] { flex-direction: column !important; align-items: stretch !important; gap: 10px !important; text-align: center; }
        body.mobile-mode .button { width: 100% !important; margin-bottom: 5px !important; justify-content: center !important; }
        body.mobile-mode table { display: block !important; overflow-x: auto !important; width: 100% !important; white-space: nowrap !important; }
        body.mobile-mode input, body.mobile-mode select { font-size: 16px !important; width: 100% !important; box-sizing: border-box !important; }
    </style>
</head>
<body>
    <div class="container">
        <div id="auth-container"></div>
        <div id="subject-view" class="hidden"></div>
        <div id="management-view" class="hidden"></div>
        <div id="add-edit-view" class="hidden"></div>
        <div id="quiz-view" class="hidden"></div>
        <div id="flashcard-view" class="hidden"></div>
        <div id="compare-view" class="hidden"></div>
        <div id="note-view" class="hidden"></div>
        <div id="rhythm-view" class="hidden"></div>
    </div>
    <div id="modal-container" class="hidden"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script src="app-db.js?v=20260419_final"></script>
    <script src="app-ui.js?v=20260419_final"></script>
    <script src="app-parser.js?v=20260419_final"></script>
    <script src="app-logic.js?v=20260419_final"></script>
</body>
<button id="view-toggle-btn" onclick="toggleViewMode()" style="position: fixed; bottom: 20px; right: 20px; z-index: 999999; padding: 12px 20px; border-radius: 50px; background: #4f46e5; color: white; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-weight: bold; cursor: pointer; font-size: 16px;">📱 모바일 모드 켜기</button>
    <script>
        // 버튼을 누르면 모바일 모드를 켜고 끕니다.
        function toggleViewMode() {
            const body = document.body;
            const btn = document.getElementById('view-toggle-btn');
            body.classList.toggle('mobile-mode');
            
            if(body.classList.contains('mobile-mode')) {
                btn.innerHTML = '💻 PC 모드로 복귀';
                btn.style.background = '#0f172a';
                localStorage.setItem('viewMode', 'mobile'); // 설정 저장
            } else {
                btn.innerHTML = '📱 모바일 모드 켜기';
                btn.style.background = '#4f46e5';
                localStorage.setItem('viewMode', 'pc'); // 설정 저장
            }
        }
        
        // 페이지 새로고침 시에도 이전 모드(PC/모바일)를 기억합니다.
        window.addEventListener('DOMContentLoaded', () => {
            if(localStorage.getItem('viewMode') === 'mobile') {
                document.body.classList.add('mobile-mode');
                const btn = document.getElementById('view-toggle-btn');
                if(btn) { btn.innerHTML = '💻 PC 모드로 복귀'; btn.style.background = '#0f172a'; }
            }
        });
    </script>
</html>
