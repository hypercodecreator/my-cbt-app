<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 CBT 학습 센터</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .hidden { display: none !important; }
        .button { padding: 10px 15px; font-size: 0.9rem; border-radius: 8px; cursor: pointer; border: 1px solid #dee2e6; font-weight: 600; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 5px; }
        .primary-button { background-color: #3b82f6; color: white; border: none; }
        .secondary-button { background-color: #64748b; color: white; border: none; }
        .light-button { background-color: #f8f9fa; color: #212529; }
        .small-button { padding: 5px 10px; font-size: 0.8em; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; box-sizing: border-box; }
        .modal-backdrop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; backdrop-filter: blur(4px); }
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 20px; z-index: 1001; width: 90%; max-width: 600px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="auth-container"></div>
        <div id="subject-view" class="hidden"></div>
        <div id="management-view" class="hidden"></div>
        <div id="quiz-view" class="hidden"></div>
        <div id="add-edit-view" class="hidden"></div>
        <div id="note-view" class="hidden"></div>
        <div id="flashcard-view" class="hidden"></div>
        <div id="rhythm-view" class="hidden"></div>
        <div id="compare-view" class="hidden"></div>
    </div>
    <div id="modal-container"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <script src="app-db.js"></script>
    <script src="app-ui.js"></script>
    <script src="app-parser.js"></script>
    <script src="app-logic.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const initCheck = setInterval(() => {
                if (window.db && window.auth && typeof window.startApp === 'function') { 
                    clearInterval(initCheck); 
                    window.startApp(); 
                }
            }, 100);
        });
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body.mobile-mode { padding: 5px !important; overflow-x: hidden !important; }
        body.mobile-mode .container { width: 100% !important; max-width: 100vw !important; padding: 15px !important; margin: 0 !important; box-sizing: border-box !important; border-radius: 0 !important; box-shadow: none !important; }
        body.mobile-mode div { min-width: 0 !important; }
        body.mobile-mode div[style*="width: 300px"], body.mobile-mode div[style*="max-width: 800px"], body.mobile-mode div[style*="width: 800px"] { width: 100% !important; max-width: 100% !important; box-sizing: border-box !important; border-right: none !important; margin-bottom: 10px !important; }
        body.mobile-mode div[style*="display: flex"], body.mobile-mode div[style*="display:flex"] { flex-wrap: wrap !important; }
        body.mobile-mode div[style*="justify-content: space-between"] { flex-direction: column !important; align-items: stretch !important; gap: 10px !important; text-align: center !important; }
        body.mobile-mode .button { width: 100% !important; margin-bottom: 5px !important; box-sizing: border-box !important; }
        body.mobile-mode input, body.mobile-mode select, body.mobile-mode textarea { font-size: 16px !important; width: 100% !important; box-sizing: border-box !important; }
        body.mobile-mode table { display: block !important; overflow-x: auto !important; width: 100% !important; }
        
        #view-toggle-btn { position: fixed; bottom: 20px; right: 20px; z-index: 999999; padding: 12px 20px; border-radius: 50px; background: #4f46e5; color: white; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
    </style>
    <button id="view-toggle-btn" onclick="toggleViewMode()">📱 모바일 모드 켜기</button>
    <script>
        function toggleViewMode() {
            document.body.classList.toggle('mobile-mode');
            const btn = document.getElementById('view-toggle-btn');
            if(document.body.classList.contains('mobile-mode')) {
                btn.innerHTML = '💻 PC 모드로 복귀';
                btn.style.background = '#0f172a';
                localStorage.setItem('viewMode', 'mobile');
            } else {
                btn.innerHTML = '📱 모바일 모드 켜기';
                btn.style.background = '#4f46e5';
                localStorage.setItem('viewMode', 'pc');
            }
        }
        if(localStorage.getItem('viewMode') === 'mobile') {
            document.body.classList.add('mobile-mode');
            const btn = document.getElementById('view-toggle-btn');
            if(btn) { btn.innerHTML = '💻 PC 모드로 복귀'; btn.style.background = '#0f172a'; }
        }
    </script>
</body>
</html>
