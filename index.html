<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>나만의 CBT 학습 센터</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; color: #333; overflow-x: hidden; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .hidden { display: none !important; }
        .button { padding: 10px 15px; font-size: 0.9rem; border-radius: 8px; cursor: pointer; border: 1px solid #dee2e6; font-weight: 600; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; }
        .primary-button { background-color: #3b82f6; color: white; border: none; }
        .secondary-button { background-color: #64748b; color: white; border: none; }
        .light-button { background-color: #f8f9fa; color: #212529; }
        .small-button { padding: 5px 10px; font-size: 0.8em; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; box-sizing: border-box; }
        .modal-backdrop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; backdrop-filter: blur(4px); }
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 20px; z-index: 1001; width: 90%; max-width: 600px; }

        /* ========================================================= */
        /* 🚀 초강력 모바일 전용 강제 스타일 (가로 짤림 원천 봉쇄) */
        /* ========================================================= */
        @media screen and (max-width: 768px) {
            body { padding: 0 !important; background: white !important; }
            .container { width: 100vw !important; max-width: 100vw !important; margin: 0 !important; padding: 15px !important; border-radius: 0 !important; box-shadow: none !important; }
            * { box-sizing: border-box !important; max-width: 100vw !important; }
            
            /* 가로로 나열된 박스들을 강제로 세로로 쌓기 */
            div[style*="display: flex"], div[style*="display:flex"] { flex-wrap: wrap !important; }
            div[style*="justify-content: space-around"], div[style*="justify-content:space-around"],
            div[style*="justify-content: space-between"], div[style*="justify-content:space-between"] {
                flex-direction: column !important; align-items: stretch !important; gap: 10px !important;
            }
            div[style*="justify-content"] > div { width: 100% !important; margin-bottom: 5px !important; }
            
            input, select, textarea { font-size: 16px !important; width: 100% !important; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="auth-container"></div>
        <div id="subject-view" class="hidden"></div>
        <div id="management-view" class="hidden"></div>
        <div id="add-edit-view" class="hidden"></div>
        <div id="quiz-view" class="hidden"></div>
        <div id="flashcard-view" class="hidden"></div>
        <div id="compare-view" class="hidden"></div>
        <div id="note-view" class="hidden"></div>
        <div id="rhythm-view" class="hidden"></div>
    </div>
    <div id="modal-container" class="hidden"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script src="app-db.js"></script>
    <script src="app-ui.js"></script>
    <script src="app-parser.js"></script>
    <script src="app-logic.js"></script>

    <script>
        function forceMobileLayout() {
            if (window.innerWidth <= 768) {
                document.querySelectorAll('div').forEach(el => {
                    const s = el.getAttribute('style') || '';
                    if(s.includes('flex')) { el.style.flexWrap = 'wrap'; }
                    if(s.includes('max-width') || s.includes('width: 800px')) { el.style.maxWidth = '100%'; el.style.width = '100%'; }
                });
            }
        }
        const observer = new MutationObserver(forceMobileLayout);
        observer.observe(document.body, { childList: true, subtree: true });
        window.addEventListener('resize', forceMobileLayout);
        setTimeout(forceMobileLayout, 500);
    </script>
</body>
</html>
