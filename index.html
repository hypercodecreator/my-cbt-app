<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>나만의 CBT 학습 센터</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .hidden { display: none !important; }
        .button { padding: 10px 15px; font-size: 0.9rem; border-radius: 8px; cursor: pointer; border: 1px solid #dee2e6; font-weight: 600; display: inline-flex; align-items: center; justify-content: center; transition: 0.2s; }
        .primary-button { background-color: #3b82f6; color: white; border: none; }
        .secondary-button { background-color: #64748b; color: white; border: none; }
        .light-button { background-color: #f8f9fa; color: #212529; }
        .small-button { padding: 5px 10px; font-size: 0.8em; }
        input, textarea, select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; box-sizing: border-box; }
        .modal-backdrop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 20px; z-index: 1001; width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto; }

        /* ========================================================= */
        /* 🛡️ 안전한 모바일 반응형 CSS (PC에는 절대 영향 안 줌!) */
        /* ========================================================= */
        @media screen and (max-width: 768px) {
            body { padding: 5px !important; }
            .container { padding: 15px !important; margin: 0 !important; width: 100% !important; border-radius: 0 !important; }
            
            /* 가로로 넓게 고정된 박스들의 제한 해제 */
            div[style*="width: 300px"], div[style*="width:300px"],
            div[style*="max-width: 800px"], div[style*="max-width:800px"],
            div[style*="min-width: 600px"], div[style*="min-width:600px"] {
                width: 100% !important; max-width: 100% !important; min-width: 0 !important; border-right: none !important;
            }
            
            /* PC용 가로 정렬(Flex)을 모바일용 세로 정렬로 부드럽게 변경 */
            #subject-view > div[style*="justify-content: space-around"],
            .draggable-item > div[style*="display:flex"],
            .draggable-item > div[style*="display: flex"] {
                flex-direction: column !important;
                align-items: stretch !important;
                gap: 10px !important;
            }
            
            .button { width: 100% !important; margin-bottom: 5px !important; text-align: center; }
            input, select { font-size: 16px !important; }
            table { display: block !important; overflow-x: auto !important; white-space: nowrap !important; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="auth-container"></div>
        <div id="subject-view" class="hidden"></div>
        <div id="management-view" class="hidden"></div>
        <div id="add-edit-view" class="hidden"></div>
        <div id="quiz-view" class="hidden"></div>
        <div id="flashcard-view" class="hidden"></div>
        <div id="compare-view" class="hidden"></div>
        <div id="note-view" class="hidden"></div>
        <div id="rhythm-view" class="hidden"></div>
    </div>
    <div id="modal-container" class="hidden"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script src="app-db.js"></script>
    <script src="app-ui.js"></script>
    <script src="app-parser.js"></script>
    <script src="app-logic.js"></script>
</body>
</html>
