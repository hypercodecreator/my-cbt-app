<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>나만의 CBT 학습 센터</title>
    <style>
        /* 💻 PC 완벽 디자인 */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); position: relative; z-index: 1; }
        .hidden { display: none !important; }
        
        .button { padding: 10px 18px; font-size: 0.95rem; border-radius: 8px; cursor: pointer; border: 1px solid transparent; font-weight: 600; transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; }
        .primary-button { background-color: #4f46e5; color: white; }
        .secondary-button { background-color: #64748b; color: white; }
        .light-button { background-color: #f8fafc; color: #334155; border-color: #e2e8f0; }
        .small-button { padding: 6px 12px; font-size: 0.85rem; }

        input[type="text"], input[type="number"], select, textarea { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #cbd5e1; box-sizing: border-box; font-size: 0.95rem; }
        
        .modal-backdrop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.6); z-index: 1000; backdrop-filter: blur(4px); }
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 20px; z-index: 1001; width: 90%; max-width: 600px; max-height: 85vh; overflow-y: auto; }

        /* ========================================================= */
        /* 📱 스마트폰 완벽 호환 모드 (가로 768px 이하) */
        /* ========================================================= */
        @media screen and (max-width: 768px) {
            body { padding: 0 !important; background-color: white; }
            .container { width: 100% !important; max-width: 100vw !important; padding: 15px !important; margin: 0 !important; border-radius: 0 !important; box-shadow: none !important; }
            
            * { box-sizing: border-box !important; max-width: 100vw !important; }
            div[style*="width: 300px"], div[style*="width:300px"], div[style*="width: 800px"], div[style*="width:800px"] { width: 100% !important; border-right: none !important; margin-bottom: 15px !important; padding-right: 0 !important; }
            
            div[style*="display: flex"], div[style*="display:flex"] { flex-wrap: wrap !important; }
            div[style*="justify-content: space-between"], div[style*="justify-content:space-between"] { flex-direction: column !important; align-items: stretch !important; gap: 10px !important; }
            
            .button { width: 100% !important; margin: 5px 0 !important; justify-content: center !important; }
            input, select, textarea { font-size: 16px !important; }
            table { display: block !important; overflow-x: auto !important; white-space: nowrap !important; width: 100% !important; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="auth-container"></div>
        <div id="subject-view" class="hidden"></div>
        <div id="management-view" class="hidden"></div>
        <div id="add-edit-view" class="hidden"></div>
        <div id="quiz-view" class="hidden"></div>
        <div id="flashcard-view" class="hidden"></div>
        <div id="compare-view" class="hidden"></div>
        <div id="note-view" class="hidden"></div>
        <div id="rhythm-view" class="hidden"></div>
    </div>
    <div id="modal-container" class="hidden"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script src="app-db.js?v=20260419_final"></script>
    <script src="app-ui.js?v=20260419_final"></script>
    <script src="app-parser.js?v=20260419_final"></script>
    <script src="app-logic.js?v=20260419_final"></script>
</body>
</html>
